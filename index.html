<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABT TOOL - 공식 보고서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"], input[type="text"] { border-bottom: 1px solid #ccc; background: transparent; text-align: center; font-size: 16px; }
        input:focus { outline: none; border-color: #3b82f6; }
        .card { background: white; padding: 1.2rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 1rem; }
        .section-title { font-weight: bold; font-size: 15px; margin-bottom: 10px; display: block; color: #1e40af; }
        /* 터치 반응성 개선 */
        button:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body class="bg-gray-50 p-3 max-w-md mx-auto text-gray-800 pb-20">

    <h1 class="text-xl font-black text-center py-4 text-blue-700">ABT TOOL 📊</h1>

    <div class="card">
        <div class="flex justify-between items-center mb-3">
            <span class="font-bold text-sm">총 방문업소:</span>
            <span><input type="number" id="total_shops" value="0" class="w-12"> 개</span>
        </div>
        <div class="text-xs font-bold text-gray-500 mb-1">📍 상권 선택</div>
        <input type="text" id="area_name" value="광안" class="w-full p-2 border rounded-md mb-3 text-left">
    </div>

    <div class="card border-l-4 border-blue-600">
        <span class="section-title text-blue-600">가. 무학 (T)</span>
        <div class="grid grid-cols-2 gap-3 text-sm">
            <div>좋은데이: <input type="number" id="m_good" value="0" class="w-10"></div>
            <div>톡시리즈: <input type="number" id="m_tok" value="0" class="w-10"></div>
            <div>갈매기: <input type="number" id="m_gal" value="0" class="w-10"></div>
            <div>기타: <input type="number" id="m_etc" value="0" class="w-10"></div>
        </div>
    </div>

    <div class="card border-l-4 border-blue-900 text-sm">
        <span class="section-title text-blue-900">나. 하이트진로 (T)</span>
        <div class="grid grid-cols-2 gap-3">
            <div>참이슬: <input type="number" id="h_isul" value="0" class="w-10"></div>
            <div>진로: <input type="number" id="h_jinro" value="0" class="w-10"></div>
            <div>기타: <input type="number" id="h_etc" value="0" class="w-10"></div>
        </div>
    </div>

    <div class="card border-l-4 border-teal-600 text-sm">
        <span class="section-title text-teal-600">다. 대선주조 (T)</span>
        <div class="grid grid-cols-2 gap-3">
            <div>대선(C1): <input type="number" id="d_daesun" value="0" class="w-10"></div>
            <div class="text-blue-600 font-bold">부산: <input type="number" id="d_busan" value="0" class="w-10"></div>
            <div>기타: <input type="number" id="d_etc" value="0" class="w-10"></div>
        </div>
    </div>

    <div class="card border-l-4 border-pink-600 text-sm">
        <span class="section-title text-pink-600">라. 롯데 (T)</span>
        <div class="grid grid-cols-2 gap-3">
            <div>새로: <input type="number" id="l_saero" value="0" class="w-10"></div>
            <div>청하: <input type="number" id="l_chungha" value="0" class="w-10"></div>
            <div>기타: <input type="number" id="l_etc" value="0" class="w-10"></div>
        </div>
    </div>

    <div class="card bg-orange-50">
        <span class="section-title text-orange-700">🔄 2. 전환 및 추가주문</span>
        <div id="worker_list" class="space-y-4">
            <div class="worker-item border-b border-orange-200 pb-3">
                <input type="text" placeholder="근무자 이름" class="worker-name font-bold mb-2 w-24 text-left border-none bg-white px-1">
                <div class="grid grid-cols-2 gap-2 text-[11px]">
                    <div>[전] 좋:<input type="number" class="w-6 t-good" value="0"> 갈:<input type="number" class="w-6 t-gal" value="0"> 톡:<input type="number" class="w-6 t-tok" value="0"></div>
                    <div>[추] 좋:<input type="number" class="w-6 a-good" value="0"> 갈:<input type="number" class="w-6 a-gal" value="0"> 톡:<input type="number" class="w-6 a-tok" value="0"></div>
                </div>
            </div>
        </div>
        <button onclick="addWorker()" class="w-full mt-2 text-xs py-2 bg-white border border-orange-300 rounded shadow-sm">+ 인원 추가하기</button>
    </div>

    <div class="card">
        <span class="section-title text-red-600">3. 타사 활동 / 4. 특이사항</span>
        <div class="space-y-2 text-sm mb-3">
            <div>하이트: <input type="text" id="act_hite" value="없음" class="w-full text-left"></div>
            <div>대선: <input type="text" id="act_daesun" value="없음" class="w-full text-left"></div>
            <div>롯데: <input type="text" id="act_lotte" value="없음" class="w-full text-left"></div>
        </div>
        <textarea id="memo" class="w-full p-2 text-sm border rounded h-16">없음</textarea>
    </div>

    <button id="copyBtn" onclick="handleCopy()" class="w-full bg-blue-700 text-white font-bold py-5 rounded-xl shadow-lg mb-4">
        계산 및 양식 복사하기
    </button>

    <div class="card bg-gray-800 text-green-400 font-mono text-[10px] min-h-[100px] overflow-x-auto">
        <pre id="final_report" class="whitespace-pre-wrap">기다리는 중...</pre>
    </div>

<script>
    function addWorker() {
        const container = document.getElementById('worker_list');
        const div = document.createElement('div');
        div.className = "worker-item border-b border-orange-200 pb-3 mt-3";
        div.innerHTML = `
            <input type="text" placeholder="근무자 이름" class="worker-name font-bold mb-2 w-24 text-left border-none bg-white px-1">
            <div class="grid grid-cols-2 gap-2 text-[11px]">
                <div>[전] 좋:<input type="number" class="w-6 t-good" value="0"> 갈:<input type="number" class="w-6 t-gal" value="0"> 톡:<input type="number" class="w-6 t-tok" value="0"></div>
                <div>[추] 좋:<input type="number" class="w-6 a-good" value="0"> 갈:<input type="number" class="w-6 a-gal" value="0"> 톡:<input type="number" class="w-6 a-tok" value="0"></div>
            </div>`;
        container.appendChild(div);
    }

    function handleCopy() {
        // 1. 보고서 생성
        const report = makeReport();
        
        // 2. 텍스트 영역 생성 및 복사 (모바일 필살기 로직)
        const textArea = document.createElement("textarea");
        textArea.value = report;
        
        // 아이폰은 가려지면 안되므로 살짝 보이게 두되 화면 밖으로 밀어냄
        textArea.style.position = "absolute";
        textArea.style.left = "-9999px";
        textArea.style.top = "0";
        document.body.appendChild(textArea);
        
        textArea.focus();
        textArea.select();
        textArea.setSelectionRange(0, 99999); // iOS용

        try {
            const successful = document.execCommand('copy');
            if (successful) {
                alert('✅ 복사 완료! 카톡에 붙여넣으세요.');
            } else {
                throw new Error('fail');
            }
        } catch (err) {
            // 실패 시 최후의 수단: 결과창으로 스크롤 이동 및 알림
            document.getElementById('final_report').scrollIntoView();
            alert('❌ 자동 복사 실패! 아래 검은 창을 길게 눌러 복사하세요.');
        }

        document.body.removeChild(textArea);
    }

    function makeReport() {
        const now = new Date();
        const days = ['일','월','화','수','목','금','토'];
        const dateStr = `${now.getMonth()+1}월 ${now.getDate()}일(${days[now.getDay()]})`;
        const area = document.getElementById('area_name').value;

        const gV = (id) => Number(document.getElementById(id).value || 0);
        
        const m = { g: gV('m_good'), t: gV('m_tok'), ga: gV('m_gal'), e: gV('m_etc') };
        const h = { i: gV('h_isul'), j: gV('h_jinro'), e: gV('h_etc') };
        const d = { c: gV('d_daesun'), b: gV('d_busan'), e: gV('d_etc') };
        const l = { s: gV('l_saero'), c: gV('l_chungha'), e: gV('l_etc') };
        
        const m_sum = m.g + m.t + m.ga + m.e;
        const total = m_sum + h.i + h.j + h.e + d.c + d.b + d.e + l.s + l.c + l.e + gV('etc_total');
        const p = (v) => total > 0 ? (v/total*100).toFixed(1) : "0.0";

        let workerSales = "", transferTxt = "", addTxt = "";
        let t_j=0, t_g=0, t_t=0, a_j=0, a_g=0, a_t=0;

        document.querySelectorAll('.worker-item').forEach(el => {
            const n = el.querySelector('.worker-name').value || "미입력";
            const tj = gV_el(el,'.t-good'), tg = gV_el(el,'.t-gal'), tt = gV_el(el,'.t-tok');
            const aj = gV_el(el,'.a-good'), ag = gV_el(el,'.a-gal'), at = gV_el(el,'.a-tok');

            t_j+=tj; t_g+=tg; t_t+=tt; a_j+=aj; a_g+=ag; a_t+=at;
            workerSales += `${n} : ${tj+tg+tt+aj+ag+at}본\n`;
            transferTxt += `${n}: ${tj}t(좋은데이) / ${tg}t(부산갈매기) / ${tt}t(톡톡)\n`;
            addTxt += `${n}: ${aj}t(좋은데이) / ${ag}t(부산갈매기) / ${at}t(톡톡)\n`;
        });

        function gV_el(parent, selector) { return Number(parent.querySelector(selector).value || 0); }

        let r = `< ${dateStr} ${area} 상권 보고 >\n\n1. 점유비\n- 총 방문업소: ${gV('total_shops')}개\n- 총 테이블 수: ${total}T\n\n`;
        r += `가. 무학: ${m_sum}T (${p(m_sum)}%)\n- 좋은데이: ${m.g}T (${p(m.g)}%)\n- 톡시리즈: ${m.t}T (${p(m.t)}%)\n- 부산갈매기: ${m.ga}T (${p(m.ga)}%)\n- 기타: ${m.e}T (${p(m.e)}%)\n\n`;
        r += `나. 하이트진로: ${h.i+h.j+h.e}T (${p(h.i+h.j+h.e)}%)\n다. 대선주조: ${d.c+d.b+d.e}T (${p(d.c+d.b+d.e)}%)\n라. 롯데: ${l.s+l.c+l.e}T (${p(l.s+l.c+l.e)}%)\n\n`;
        r += `2. 전환 및 추가주문\n\n가. 근무인원\n부산 갈매기 총 판매 병 수\n${workerSales}\n`;
        r += `나. 총 전환: ${t_j}t/ ${t_g}t/ ${t_t}t\n${transferTxt}\n다. 총 추가주문: ${a_j}t/ ${a_g}t/ ${a_t}t\n${addTxt}\n`;
        r += `3. 타사 활동\n- 하이트: ${document.getElementById('act_hite').value}\n- 대선: ${document.getElementById('act_daesun').value}\n- 롯데: ${document.getElementById('act_lotte').value}\n\n`;
        r += `4. 특이사항\n- ${document.getElementById('memo').value}`;

        document.getElementById('final_report').innerText = r;
        return r;
    }
</script>
</body>
</html>
