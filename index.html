<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABT TOOL - 공식 보고서용</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"], input[type="text"] { border-bottom: 1px solid #ccc; background: transparent; text-align: center; font-size: 14px; }
        input:focus { outline: none; border-color: #3b82f6; }
        .card { background: white; padding: 1.2rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 1rem; }
        .section-title { font-weight: bold; font-size: 15px; margin-bottom: 10px; display: block; color: #1e40af; }
        .sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; }
    </style>
</head>
<body class="bg-gray-50 p-3 max-w-md mx-auto text-gray-800 pb-20">

    <h1 class="text-xl font-black text-center py-4 text-blue-700">ABT TOOL 📊</h1>

    <div class="card">
        <div class="flex justify-between items-center mb-3">
            <span class="font-bold text-sm">총 방문업소:</span>
            <span><input type="number" id="total_shops" value="0" class="w-12"> 개</span>
        </div>
        <div class="text-xs font-bold text-gray-500 mb-1">📍 상권 선택</div>
        <input type="text" id="area_name" value="광안" class="w-full p-2 border rounded-md mb-3 text-left">
    </div>

    <div class="card border-l-4 border-blue-600">
        <span class="section-title">가. 무학 (T)</span>
        <div class="sub-grid">
            <div>좋은데이: <input type="number" id="m_good" value="0" class="w-10"></div>
            <div>톡시리즈: <input type="number" id="m_tok" value="0" class="w-10"></div>
            <div>부산갈매기: <input type="number" id="m_gal" value="0" class="w-10"></div>
            <div>기타: <input type="number" id="m_etc" value="0" class="w-10"></div>
        </div>
    </div>

    <div class="card border-l-4 border-blue-900">
        <span class="section-title">나. 하이트진로 (T)</span>
        <div class="sub-grid">
            <div>참이슬: <input type="number" id="h_isul" value="0" class="w-10"></div>
            <div>진로: <input type="number" id="h_jinro" value="0" class="w-10"></div>
            <div>기타: <input type="number" id="h_etc" value="0" class="w-10"></div>
        </div>
    </div>

    <div class="card border-l-4 border-teal-600">
        <span class="section-title">다. 대선주조 (T)</span>
        <div class="sub-grid">
            <div>대선(C1): <input type="number" id="d_daesun" value="0" class="w-10"></div>
            <div>부산: <input type="number" id="d_busan" value="0" class="w-10"></div>
            <div>기타: <input type="number" id="d_etc" value="0" class="w-10"></div>
        </div>
    </div>

    <div class="card border-l-4 border-pink-600">
        <span class="section-title">라. 롯데 (T)</span>
        <div class="sub-grid">
            <div>새로: <input type="number" id="l_saero" value="0" class="w-10"></div>
            <div>청하: <input type="number" id="l_chungha" value="0" class="w-10"></div>
            <div>기타: <input type="number" id="l_etc" value="0" class="w-10"></div>
        </div>
    </div>

    <div class="card">
        <span class="section-title text-gray-600">마. 기타 주류사 (T)</span>
        <div>기타합계: <input type="number" id="etc_total" value="0" class="w-12"></div>
    </div>

    <div class="card bg-orange-50">
        <span class="section-title text-orange-700">🔄 2. 전환 및 추가주문</span>
        <div id="worker_list" class="space-y-4">
            <div class="worker-item border-b border-orange-200 pb-3">
                <input type="text" placeholder="근무자 이름" class="worker-name font-bold mb-2 w-24 text-left border-none bg-white px-1">
                <div class="grid grid-cols-2 gap-2 text-[11px]">
                    <div>[전환] 좋:<input type="number" class="w-6 t-good"> 갈:<input type="number" class="w-6 t-gal"> 톡:<input type="number" class="w-6 t-tok"></div>
                    <div>[추가] 좋:<input type="number" class="w-6 a-good"> 갈:<input type="number" class="w-6 a-gal"> 톡:<input type="number" class="w-6 a-tok"></div>
                </div>
            </div>
        </div>
        <button onclick="addWorker()" class="w-full mt-2 text-xs py-1 bg-white border border-orange-300 rounded">+ 근무자 추가</button>
    </div>

    <div class="card">
        <span class="section-title text-red-600">3. 타사 활동</span>
        <div class="space-y-2 text-sm">
            <div>하이트진로: <input type="text" id="act_hite" value="없음" class="w-full text-left mt-1"></div>
            <div>대선주조: <input type="text" id="act_daesun" value="없음" class="w-full text-left mt-1"></div>
            <div>롯데주류: <input type="text" id="act_lotte" value="없음" class="w-full text-left mt-1"></div>
        </div>
        <span class="section-title text-gray-700 mt-4">4. 특이사항</span>
        <textarea id="memo" class="w-full p-2 text-sm border rounded mt-1 h-20">없음</textarea>
    </div>

    <button onclick="copyReport()" class="w-full bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg mb-4 active:scale-95 transition">계산 및 양식 복사하기</button>

    <script>
        function addWorker() {
            const container = document.getElementById('worker_list');
            const div = document.createElement('div');
            div.className = "worker-item border-b border-orange-200 pb-3 mt-3";
            div.innerHTML = `
                <input type="text" placeholder="근무자 이름" class="worker-name font-bold mb-2 w-24 text-left border-none bg-white px-1">
                <div class="grid grid-cols-2 gap-2 text-[11px]">
                    <div>[전환] 좋:<input type="number" class="w-6 t-good"> 갈:<input type="number" class="w-6 t-gal"> 톡:<input type="number" class="w-6 t-tok"></div>
                    <div>[추가] 좋:<input type="number" class="w-6 a-good"> 갈:<input type="number" class="w-6 a-gal"> 톡:<input type="number" class="w-6 a-tok"></div>
                </div>`;
            container.appendChild(div);
        }

        function copyReport() {
            const now = new Date();
            const days = ['일','월','화','수','목','금','토'];
            const dateStr = `${now.getMonth()+1}월 ${now.getDate()}일(${days[now.getDay()]})`;
            const area = document.getElementById('area_name').value;

            // 수치 계산
            const getVal = (id) => Number(document.getElementById(id).value);
            const m = { g: getVal('m_good'), t: getVal('m_tok'), ga: getVal('m_gal'), e: getVal('m_etc') };
            const h = { i: getVal('h_isul'), j: getVal('h_jinro'), e: getVal('h_etc') };
            const d = { c: getVal('d_daesun'), b: getVal('d_busan'), e: getVal('d_etc') };
            const l = { s: getVal('l_saero'), c: getVal('l_chungha'), e: getVal('l_etc') };
            const etc_sum = getVal('etc_total');

            const m_sum = m.g + m.t + m.ga + m.e;
            const h_sum = h.i + h.j + h.e;
            const d_sum = d.c + d.b + d.e;
            const l_sum = l.s + l.c + l.e;
            const total_t = m_sum + h_sum + d_sum + l_sum + etc_sum;

            const perc = (val) => total_t > 0 ? (val/total_t*100).toFixed(1) : "0.0";

            // 전환/추가 합산 로직
            let workerTxt = "";
            let total_t_good=0, total_t_gal=0, total_t_tok=0;
            let total_a_good=0, total_a_gal=0, total_a_tok=0;

            document.querySelectorAll('.worker-item').forEach(el => {
                const name = el.querySelector('.worker-name').value || "미입력";
                const tg = Number(el.querySelector('.t-good').value || 0);
                const tga = Number(el.querySelector('.t-gal').value || 0);
                const tt = Number(el.querySelector('.t-tok').value || 0);
                const ag = Number(el.querySelector('.a-good').value || 0);
                const aga = Number(el.querySelector('.a-gal').value || 0);
                const at = Number(el.querySelector('.a-tok').value || 0);

                total_t_good += tg; total_t_gal += tga; total_t_tok += tt;
                total_a_good += ag; total_a_gal += aga; total_a_tok += at;

                workerTxt += `\n${name}: ${tg}t(좋은데이) / ${tga}t(부산갈매기) / ${tt}t(톡톡)`;
            });

            let report = `< ${dateStr} ${area} 상권 보고 >\n\n`;
            report += `1. 점유비\n`;
            report += `- 총 방문업소: ${getVal('total_shops')}개\n`;
            report += `- 총 테이블 수: ${total_t}T\n\n`;

            report += `가. 무학: ${m_sum}T (${perc(m_sum)}%)\n`;
            report += `- 좋은데이: ${m.g}T (${perc(m.g)}%)\n- 톡시리즈: ${m.t}T (${perc(m.t)}%)\n- 부산갈매기: ${m.ga}T (${perc(m.ga)}%)\n- 기타: ${m.e}T (${perc(m.e)}%)\n\n`;

            report += `나. 하이트진로: ${h_sum}T (${perc(h_sum)}%)\n`;
            report += `- 참이슬: ${h.i}T (${perc(h.i)}%)\n- 진로: ${h.j}T (${perc(h.j)}%)\n- 기타: ${h.e}T (${perc(h.e)}%)\n\n`;

            report += `다. 대선주조: ${d_sum}T (${perc(d_sum)}%)\n`;
            report += `- 대선(C1 포함): ${d.c}T (${perc(d.c)}%)\n- 부산: ${d.b}T (${perc(d.b)}%)\n- 기타: ${d.e}T (${perc(d.e)}%)\n\n`;

            report += `라. 롯데: ${l_sum}T (${perc(l_sum)}%)\n`;
            report += `- 새로(살구 포함): ${l.s}T (${perc(l.s)}%)\n- 청하(별빛청하 포함): ${l.c}T (${perc(l.c)}%)\n- 기타: ${l.e}T (${perc(l.e)}%)\n\n`;

            report += `마. 기타 주류회사: ${etc_sum}T (${perc(etc_sum)}%)\n\n`;

            report += `2. 전환 및 추가주문\n\n`;
            report += `가. 근무인원 및 판매\n${workerTxt}\n\n`;
            report += `나. 총 전환: ${total_t_good}t(좋은데이) / ${total_t_gal}t(부산갈매기) / ${total_t_tok}t(톡톡)\n${workerTxt}\n\n`;
            report += `다. 총 추가주문: ${total_a_good}t(좋은데이) / ${total_a_gal}t(부산갈매기) / ${total_a_tok}t(톡톡)\n\n`;

            report += `3. 타사 활동\n- 하이트진로: ${document.getElementById('act_hite').value}\n- 대선주조: ${document.getElementById('act_daesun').value}\n- 롯데주류: ${document.getElementById('act_lotte').value}\n\n`;
            report += `4. 특이사항\n- ${document.getElementById('memo').value}`;

            navigator.clipboard.writeText(report).then(() => {
                alert('보고서 양식이 클립보드에 복사되었습니다!');
            });
        }
    </script>
</body>
</html>
