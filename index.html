<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABT TOOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"], input[type="text"] { border-bottom: 1px solid #ccc; background: transparent; text-align: center; font-size: 16px; width: 45px; }
        input:focus { outline: none; border-color: #3b82f6; }
        .card { background: white; padding: 1.2rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 1rem; }
        .section-title { font-weight: bold; font-size: 14px; margin-bottom: 8px; display: block; color: #1e40af; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        #temp_copy_area { position: absolute; left: -9999px; top: 0; }
    </style>
</head>
<body class="bg-gray-50 p-3 max-w-md mx-auto text-gray-800 pb-20">

    <h1 class="text-xl font-black text-center py-4 text-blue-700">ABT TOOL 📊</h1>

    <div class="card">
        <div class="flex justify-between items-center mb-3">
            <span class="font-bold text-sm">총 방문업소:</span>
            <span><input type="number" id="total_shops" value="0"> 개</span>
        </div>
        <div class="text-xs font-bold text-gray-500 mb-1">📍 상권 선택</div>
        <input type="text" id="area_name" value="광안" class="w-full p-2 border rounded-md mb-3 text-left">
    </div>

    <div class="card border-l-4 border-blue-600 text-sm">
        <span class="section-title">가. 무학 (T)</span>
        <div class="grid grid-cols-2 gap-3">
            <div>좋은데이: <input type="number" id="m_good" value="0"></div>
            <div>톡시리즈: <input type="number" id="m_tok" value="0"></div>
            <div>갈매기: <input type="number" id="m_gal" value="0"></div>
            <div>기타: <input type="number" id="m_etc" value="0"></div>
        </div>
    </div>

    <div class="card border-l-4 border-blue-900 text-sm">
        <span class="section-title">나. 하이트진로 (T)</span>
        <div class="grid grid-cols-2 gap-3">
            <div>참이슬: <input type="number" id="h_isul" value="0"></div>
            <div>진로: <input type="number" id="h_jinro" value="0"></div>
            <div>기타: <input type="number" id="h_etc" value="0"></div>
        </div>
    </div>

    <div class="card border-l-4 border-teal-600 text-sm">
        <span class="section-title">다. 대선주조 (T)</span>
        <div class="grid grid-cols-2 gap-3">
            <div>대선(C1): <input type="number" id="d_daesun" value="0"></div>
            <div class="text-blue-600">부산: <input type="number" id="d_busan" value="0"></div>
            <div>기타: <input type="number" id="d_etc" value="0"></div>
        </div>
    </div>

    <div class="card border-l-4 border-pink-600 text-sm">
        <span class="section-title">라. 롯데 (T)</span>
        <div class="grid grid-cols-2 gap-3">
            <div>새로: <input type="number" id="l_saero" value="0"></div>
            <div>청하: <input type="number" id="l_chungha" value="0"></div>
            <div>기타: <input type="number" id="l_etc" value="0"></div>
        </div>
    </div>

    <div class="card text-sm">
        <span class="section-title text-gray-500">마. 기타 주류회사 (T)</span>
        <div>기타합계: <input type="number" id="etc_total" value="0"></div>
    </div>

    <div class="card bg-orange-50">
        <span class="section-title text-orange-700">🔄 2. 전환 및 추가주문</span>
        <div id="worker_list" class="space-y-4">
            <div class="worker-item border-b border-orange-200 pb-3">
                <input type="text" placeholder="근무자 이름" class="worker-name font-bold mb-2 w-24 text-left border-none bg-white px-1 shadow-sm rounded" value="김좋은">
                <div class="grid grid-cols-2 gap-2 text-[10px]">
                    <div>[전] 좋:<input type="number" class="w-6 t-good" value="0"> 갈:<input type="number" class="w-6 t-gal" value="0"> 톡:<input type="number" class="w-6 t-tok" value="0"></div>
                    <div>[추] 좋:<input type="number" class="w-6 a-good" value="0"> 갈:<input type="number" class="w-6 a-gal" value="0"> 톡:<input type="number" class="w-6 a-tok" value="0"></div>
                </div>
            </div>
        </div>
        <button onclick="addWorker()" class="w-full mt-2 text-xs py-2 bg-white border border-orange-300 rounded shadow-sm">+ 인원 추가</button>
    </div>

    <div class="card text-sm">
        <span class="section-title text-red-600">3. 타사 활동 / 4. 특이사항</span>
        <div class="space-y-2 mb-3">
            <div>하이트: <input type="text" id="act_hite" value="없음" class="w-full text-left border-none"></div>
            <div>대선: <input type="text" id="act_daesun" value="없음" class="w-full text-left border-none"></div>
            <div>롯데: <input type="text" id="act_lotte" value="없음" class="w-full text-left border-none"></div>
        </div>
        <textarea id="memo" class="w-full p-2 text-xs border rounded h-16 bg-gray-50">없음</textarea>
    </div>

    <button onclick="handleCopy()" class="w-full bg-blue-700 text-white font-bold py-5 rounded-xl shadow-lg mb-4 active:bg-blue-800">
        계산 및 양식 복사하기
    </button>

    <div class="card bg-gray-800 text-green-400 font-mono text-[11px] min-h-[120px]">
        <pre id="final_report" class="whitespace-pre-wrap leading-tight">입력 후 버튼을 눌러주세요.</pre>
    </div>

<script>
    function addWorker() {
        const container = document.getElementById('worker_list');
        const div = document.createElement('div');
        div.className = "worker-item border-b border-orange-200 pb-3 mt-3";
        div.innerHTML = `
            <input type="text" placeholder="근무자 이름" class="worker-name font-bold mb-2 w-24 text-left border-none bg-white px-1 shadow-sm rounded">
            <div class="grid grid-cols-2 gap-2 text-[10px]">
                <div>[전] 좋:<input type="number" class="w-6 t-good" value="0"> 갈:<input type="number" class="w-6 t-gal" value="0"> 톡:<input type="number" class="w-6 t-tok" value="0"></div>
                <div>[추] 좋:<input type="number" class="w-6 a-good" value="0"> 갈:<input type="number" class="w-6 a-gal" value="0"> 톡:<input type="number" class="w-6 a-tok" value="0"></div>
            </div>`;
        container.appendChild(div);
    }

    function handleCopy() {
        try {
            const reportText = generateReport();
            
            // 모바일 복사 필살기 로직
            const textArea = document.createElement("textarea");
            textArea.value = reportText;
            textArea.id = "temp_copy_area";
            document.body.appendChild(textArea);
            
            textArea.focus();
            textArea.select();
            textArea.setSelectionRange(0, 99999); 

            const successful = document.execCommand('copy');
            document.body.removeChild(textArea);

            if (successful) {
                alert('✅ 복사 완료! 카톡에 붙여넣으세요.');
            } else {
                throw new Error('Copy command failed');
            }
        } catch (err) {
            console.error(err);
            alert('❌ 오류 발생! 입력값을 확인하거나 하단 미리보기 창을 길게 눌러 복사하세요.');
        }
    }

    function generateReport() {
        const now = new Date();
        const days = ['일','월','화','수','목','금','토'];
        const dateStr = `${now.getMonth()+1}월 ${now.getDate()}일(${days[now.getDay()]})`;
        const area = document.getElementById('area_name').value;

        // 안전하게 값 가져오는 헬퍼 (null 방지)
        const v = (id) => {
            const el = document.getElementById(id);
            return el ? Number(el.value || 0) : 0;
        };

        const m = { g: v('m_good'), t: v('m_tok'), ga: v('m_gal'), e: v('m_etc') };
        const h = { i: v('h_isul'), j: v('h_jinro'), e: v('h_etc') };
        const d = { c: v('d_daesun'), b: v('d_busan'), e: v('d_etc') };
        const l = { s: v('l_saero'), c: v('l_chungha'), e: v('l_etc') };
        const etcTotal = v('etc_total');

        const m_sum = m.g + m.t + m.ga + m.e;
        const h_sum = h.i + h.j + h.e;
        const d_sum = d.c + d.b + d.e;
        const l_sum = l.s + l.c + l.e;
        const total_T = m_sum + h_sum + d_sum + l_sum + etcTotal;

        const pc = (val) => total_T > 0 ? (val / total_T * 100).toFixed(1) : "0.0";

        let wSales = "", tTxt = "", aTxt = "";
        let t_j=0, t_g=0, t_t=0, a_j=0, a_g=0, a_t=0;

        document.querySelectorAll('.worker-item').forEach(el => {
            const name = el.querySelector('.worker-name').value || "미입력";
            const tj = Number(el.querySelector('.t-good').value || 0);
            const tg = Number(el.querySelector('.t-gal').value || 0);
            const tt = Number(el.querySelector('.t-tok').value || 0);
            const aj = Number(el.querySelector('.a-good').value || 0);
            const ag = Number(el.querySelector('.a-gal').value || 0);
            const at = Number(el.querySelector('.a-tok').value || 0);

            t_j += tj; t_g += tg; t_t += tt; a_j += aj; a_g += ag; a_t += at;
            wSales += `${name} : ${tj+tg+tt+aj+ag+at}본\n`;
            tTxt += `${name}: ${tj}t(좋은데이) / ${tg}t(부산갈매기) / ${tt}t(톡톡)\n`;
            addTxt += `${name}: ${aj}t(좋은데이) / ${ag}t(부산갈매기) / ${at}t(톡톡)\n`;
        });

        let r = `< ${dateStr} ${area} 상권 보고 >\n\n`;
        r += `1. 점유비\n- 총 방문업소: ${v('total_shops')}개\n- 총 테이블 수: ${total_T}T\n\n`;
        r += `가. 무학: ${m_sum}T (${pc(m_sum)}%)\n- 좋은데이: ${m.g}T (${pc(m.g)}%)\n- 톡시리즈: ${m.t}T (${pc(m.t)}%)\n- 부산갈매기: ${m.ga}T (${pc(m.ga)}%)\n- 기타: ${m.e}T (${pc(m.e)}%)\n\n`;
        r += `나. 하이트진로: ${h_sum}T (${pc(h_sum)}%)\n- 참이슬: ${h.i}T (${pc(h.i)}%)\n- 진로: ${h.j}T (${pc(h.j)}%)\n- 기타: ${h.e}T (${pc(h.e)}%)\n\n`;
        r += `다. 대선주조: ${d_sum}T (${pc(d_sum)}%)\n- 대선(C1 포함): ${d.c}T (${pc(d.c)}%)\n- 부산: ${d.b}T (${pc(d.b)}%)\n- 기타: ${d.e}T (${pc(d.e)}%)\n\n`;
        r += `라. 롯데: ${l_sum}T (${pc(l_sum)}%)\n- 새로(살구 포함): ${l.s}T (${pc(l.s)}%)\n- 청하(별빛청하 포함): ${l.c}T (${pc(l.c)}%)\n- 기타: ${l.e}T (${pc(l.e)}%)\n\n`;
        r += `마. 기타 주류회사: ${etcTotal}T (${pc(etcTotal)}%)\n\n`;
        r += `2. 전환 및 추가주문\n\n가. 근무인원\n부산 갈매기 총 판매 병 수\n${wSales}\n`;
        r += `나. 총 전환: ${t_j}t(좋은데이) / ${t_g}t(부산갈매기) / ${t_t}t(톡톡)\n${tTxt}\n`;
        r += `다. 총 추가주문: ${a_j}t(좋은데이) / ${a_g}t(부산갈매기) / ${a_t}t(톡톡)\n${aTxt}\n`;
        r += `3. 타사 활동\n- 하이트: ${document.getElementById('act_hite').value}\n- 대선: ${document.getElementById('act_daesun').value}\n- 롯데: ${document.getElementById('act_lotte').value}\n\n`;
        r += `4. 특이사항\n- ${document.getElementById('memo').value}`;

        document.getElementById('final_report').innerText = r;
        return r;
    }
</script>
</body>
</html>
